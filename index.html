<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정소채 · Gabriela Jeong</title>
  <meta
    name="description"
    content="심리학의 시선으로 유저 문제를 정의하고, 수익 구조를 설계해 성과를 만들어 온 PM 포트폴리오입니다."
  />
  <!-- 테마 초기화 — 페인트 전에 data-theme 적용 (FOUC 방지). 홈 전용 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) { /* localStorage/matchMedia 차단 환경 무시 */ }
    })();
  </script>
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<script src="/nav.js"></script>

  <section class="hero" id="top">

    <!-- 데코: blueprint 좌표 라벨 -->
    <span class="hero-coord" style="top: 15%; left: 28%;">[405:589]</span>
    <span class="hero-coord" style="top: 24%; right: 34%;">[269:693]</span>
    <span class="hero-coord" style="bottom: 32%; left: 10%;">[311:185]</span>
    <span class="hero-coord" style="top: 46%; right: 12%;">[889:501]</span>
    <span class="hero-coord" style="bottom: 20%; right: 40%;">[22:146]</span>

    <!-- 데코: 레이더 (우상단) -->
    <svg class="hero-radar" viewBox="0 0 200 200" aria-hidden="true">
      <!-- 외곽 점선 링 + 십자선 — 시계방향 회전 -->
      <g class="radar-spin radar-spin--cw">
        <circle class="radar-ring--dashed" cx="100" cy="100" r="94" />
        <line x1="100" y1="6" x2="100" y2="194" />
        <line x1="6" y1="100" x2="194" y2="100" />
      </g>
      <!-- 중간 점선 링 + 대각선 — 반시계 회전 -->
      <g class="radar-spin radar-spin--ccw">
        <circle class="radar-ring--dashed" cx="100" cy="100" r="66" />
        <line x1="32" y1="32" x2="168" y2="168" />
        <line x1="168" y1="32" x2="32" y2="168" />
      </g>
      <!-- 고정 실선 링 -->
      <circle class="radar-ring" cx="100" cy="100" r="36" />
      <!-- 중심: 겹친 사각형들 (레이어) -->
      <g class="radar-shapes">
        <rect class="radar-sq radar-sq--a" x="76" y="76" width="48" height="48" />
        <rect class="radar-sq radar-sq--b" x="80" y="80" width="40" height="40" transform="rotate(22 100 100)" />
        <rect class="radar-sq radar-sq--c" x="84" y="84" width="32" height="32" transform="rotate(45 100 100)" />
      </g>
    </svg>

    <div class="hero-inner">
      <div class="hero-eyebrow">
        <span class="hero-eyebrow-tick">&#9656;</span>
        B2C SaaS · 콘텐츠 플랫폼 · AI 프로덕트
      </div>

      <h1 class="hero-display">PRODUCT<br />MANAGER</h1>

      <p class="hero-sub">
        <span class="accent">사용자 행동</span>을 읽고, 제품의 수익 구조를 만드는 PM.<br />
        문제 정의부터 실행, 수익화까지 직접 다룹니다.
      </p>

      <div class="hero-metrics">
        <div class="hero-metric">월 매출 15만 →&nbsp;<span class="gold">1,100만+</span></div>
        <div class="hero-metric">비용 회수율 2% →&nbsp;<span class="gold">262%</span></div>
        <div class="hero-metric">B2B 계약&nbsp;<span class="gold">11건</span></div>
      </div>
    </div>

    <!-- 하단 상태 라인 -->
    <div class="hero-status-bar">
      <div class="hero-status">
        <span class="status-dot"></span>
        <span>AVAILABLE FOR NEW OPPORTUNITIES</span>
      </div>
      <div class="hero-clock">
        <span class="hero-clock-label">SEOUL · GMT+9</span>
        <span class="hero-clock-time" id="heroClock">--:--:--</span>
      </div>
    </div>

  </section>

  <button class="back-to-top" id="backToTop" aria-label="맨 위로">↑</button>

  <script src="/script.js"></script>
</body>
</html>
