<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodyfit</title>
  <meta name="description" content="Moodyfit 사이드 프로젝트 케이스 스터디는 현재 준비 중입니다.">
  <link
    rel="stylesheet"
    as="style"
    crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
  />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/components.css">
  <link rel="stylesheet" href="/moodyfit/moodyfit.css">
</head>
<body class="case-page">
<script src="/nav.js"></script>

  <main class="case-main">
    <div class="case-inner">

      <a href="/work/" class="case-back-link">← 모든 프로젝트 보기</a>

      <!-- ══════════ HERO (임시 · 준비 중) ══════════ -->
      <section class="case-hero" id="top">
        <div class="case-hero-text">
          <div class="case-meta-tags">
            <span class="case-tag tag-primary">SIDE PRODUCT · MOODYFIT</span>
            <span class="case-tag tag-secondary">준비 중</span>
          </div>

          <h1 class="case-title">
            Moodyfit, <span class="accent">곧 공개됩니다</span>
          </h1>

          <p class="case-summary">
            무디핏은 가중치와 LLM을 활용한 추천 시스템을 접목한 멀티 패션 커머스 앱입니다. <br />
            케이스 스터디는 정리 중이지만, 아래에서 프론트 데모를 미리 둘러볼 수 있습니다.
          </p>
        </div>
      </section>

      <!-- ══════════ 프론트 데모 (예시 화면) ══════════ -->
      <section class="case-section" id="demo">
        <div class="case-section-header">
          <div class="case-section-label">LIVE DEMO</div>
        </div>
        <h2 class="case-section-title">프론트 데모 미리보기</h2>
        <p class="case-section-sub">아직 프론트만 배포된 예시 화면입니다. 가볍게 둘러보세요.</p>

        <div class="moodyfit-demo">
          <iframe
            src="https://moodyfit-alpha.vercel.app/"
            title="Moodyfit — AI 패션 추천 데모"
            width="390" height="844" loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <div class="moodyfit-demo-actions">
          <a href="https://moodyfit-alpha.vercel.app/" target="_blank" rel="noopener" class="moodyfit-demo-open">새 창에서 열기 ↗</a>
        </div>
        <p class="moodyfit-demo-note">실제 추천 로직(가중치·LLM)과 상세 케이스는 정리되는 대로 공개됩니다.</p>
      </section>

    </div>
  </main>

  <button class="back-to-top" id="backToTop" aria-label="맨 위로">↑</button>

  <script src="/script.js"></script>
</body>
</html>
